<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Search</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1 class="title">ページ内検索</h1>
      <input id="searchInput" class="search-input" type="text" placeholder="キーワードを入力" />
      <div class="buttons">
        <button id="searchButton" type="button">検索</button>
        <button id="prevButton" type="button">前へ</button>
        <button id="nextButton" type="button">次へ</button>
        <button id="clearButton" type="button" class="secondary">クリア</button>
      </div>
      <p id="statusText" class="status">キーワードを入力してください</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
